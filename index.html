<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Health Cockpit V9</title>
  <style>
    :root {
      --bg: #060b14;
      --bg2: #0b1322;
      --panel: rgba(15, 22, 38, 0.72);
      --panel-strong: rgba(17, 27, 45, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #edf4ff;
      --muted: #92a7c9;
      --good: #31e3a9;
      --warn: #ffcb67;
      --bad: #ff7e87;
      --blue: #73b9ff;
      --violet: #b69bff;
      --cyan: #7ce8f8;
      --shadow: 0 28px 64px rgba(0,0,0,0.34);
      --radius: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(97,129,255,0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(44,203,187,0.12), transparent 22%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #03070f 100%);
      min-height: 100vh;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 14px 12px 110px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 18px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(22,34,56,0.96), rgba(9,16,28,0.94));
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #c5d4ea;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    .sub {
      margin-top: 8px;
      color: #c8d4e7;
      font-size: 14px;
      line-height: 1.45;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 12px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .muted { color: var(--muted); font-size: 13px; line-height: 1.5; }

    .grid2, .grid3 { display: grid; gap: 10px; }
    .grid2 { grid-template-columns: repeat(2, 1fr); }
    .grid3 { grid-template-columns: repeat(3, 1fr); }

    .card, .module, .row, .trend, .input-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #c5d2e4;
      margin-bottom: 8px;
    }

    .big {
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .tiny {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 6px;
    }

    .pill {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .good { color: #8ff3cb; background: rgba(49,227,169,0.14); }
    .warn { color: #ffdf98; background: rgba(255,203,103,0.14); }
    .bad { color: #ffb7bb; background: rgba(255,126,135,0.14); }
    .blue { color: #b7dbff; background: rgba(115,185,255,0.14); }
    .violet { color: #decfff; background: rgba(182,155,255,0.14); }

    .today-layout { display: grid; gap: 12px; }

    .gauge-wrap {
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 12px;
    }

    .gauge-box {
      width: 100%;
      max-width: 340px;
      position: relative;
    }

    .gauge-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .gauge-score {
      font-size: 60px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .gauge-label {
      margin-top: 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .11em;
      color: #d6deec;
    }

    .row-top, .module-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .name { font-size: 15px; font-weight: 700; }
    .value { font-size: 14px; font-weight: 700; }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .bar {
      height: 10px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill { height: 100%; border-radius: 999px; }
    .fill-good { background: linear-gradient(90deg, #31e3a9, #75f1cb); }
    .fill-warn { background: linear-gradient(90deg, #ffbe57, #ffdd9b); }
    .fill-bad { background: linear-gradient(90deg, #ff6c77, #ffafb4); }
    .fill-blue { background: linear-gradient(90deg, #6eb5ff, #9ed3ff); }
    .fill-violet { background: linear-gradient(90deg, #ad8dff, #ceb8ff); }
    .fill-cyan { background: linear-gradient(90deg, #72e5f8, #aaf2ff); }

    .module-grid { display: grid; gap: 10px; }

    .stack { display: grid; gap: 10px; }

    .trend h3 { margin: 0 0 10px; font-size: 15px; }
    .caption { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 8px; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .legend span::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .l1::before { background: #ff8b8b; }
    .l2::before { background: #31e3a9; }
    .l3::before { background: #6eb5ff; }
    .l4::before { background: #b69bff; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 10px 6px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    th {
      color: #c3d0e3;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    tr:last-child td { border-bottom: 0; }

    svg { width: 100%; height: auto; display: block; }
    .axis { stroke: rgba(255,255,255,0.12); stroke-width: 1; }
    .tick { fill: #90a3bf; font-size: 10px; }
    .line-red { fill: none; stroke: #ff8b8b; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .line-green { fill: none; stroke: #31e3a9; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .line-blue { fill: none; stroke: #6eb5ff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .line-violet { fill: none; stroke: #b69bff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

    label { display: block; font-size: 12px; color: #c8d4e4; margin-bottom: 6px; }
    .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    input {
      width: 100%;
