<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Cockpit</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f18;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#141a2a;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.score{
font-size:60px;
font-weight:800;
text-align:center;
}

.title{
font-size:20px;
margin-bottom:10px;
}

button{
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.primary{
background:#3ce6a6;
color:black;
}

.secondary{
background:#283047;
color:white;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

.bar{
height:8px;
background:#1f2638;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.fill{
height:100%;
background:#3ce6a6;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">Health Score</div>

<div class="score" id="healthScore">74</div>

<div class="bar">
<div id="scoreBar" class="fill" style="width:74%"></div>
</div>

</div>

<div class="card">

<div class="title">IQOS Tracker</div>

<div style="text-align:center;font-size:40px;font-weight:700">
<span id="iqosCount">0</span>
</div>

<div style="text-align:center;margin-top:5px">
sticks aujourd'hui
</div>

<div class="row">

<button class="secondary" onclick="removeIQOS()">-1</button>

<button class="primary" onclick="addIQOS()">+1 IQOS</button>

<button class="secondary" onclick="resetIQOS()">Reset</button>

</div>

<div style="margin-top:15px;text-align:center">
Impact score :
<span id="iqosImpact">0</span>
</div>

</div>

<div class="card">

<div class="title">Insights</div>

<div id="insightText">
Score basé sur activité, récupération et risque cardiovasculaire.
</div>

</div>

</div>

<script>

let baseScore = 74
let iqosToday = 0
let impact = 0

function updateHealthScore(){

let score = baseScore + impact

if(score > 100) score = 100
if(score < 0) score = 0

document.getElementById("healthScore").innerText = score
document.getElementById("scoreBar").style.width = score + "%"

updateInsights()

}

function updateInsights(){

let text = ""

if(iqosToday == 0){

text = "Excellent : aucun IQOS aujourd'hui."

}

else if(iqosToday <=3){

text = "Réduction du tabac détectée."

}

else if(iqosToday <=7){

text = "Impact modéré du tabac."

}

else{

text = "Le tabac impacte ton score santé."

}

document.getElementById("insightText").innerText = text

}

function updateIQOS(){

document.getElementById("iqosCount").innerText = iqosToday

if(iqosToday === 0) impact = 5
else if(iqosToday <=3) impact = 2
else if(iqosToday <=7) impact = -1
else if(iqosToday <=12) impact = -3
else impact = -6

document.getElementById("iqosImpact").innerText = impact

updateHealthScore()

}

function addIQOS(){

iqosToday++

updateIQOS()

}

function removeIQOS(){

if(iqosToday > 0){

iqosToday--

}

updateIQOS()

}

function resetIQOS(){

iqosToday = 0

updateIQOS()

}

updateHealthScore()

</script>

</body>

</html>
