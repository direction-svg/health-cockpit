<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Cockpit V5</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#0b1320;color:#e8f1ff;margin:0;padding:20px;}
.container{max-width:430px;margin:auto}
.card{background:#111c2e;border-radius:18px;padding:16px;margin-bottom:14px}
h1{margin:0 0 10px;font-size:26px}
h2{margin:0 0 10px;font-size:18px}
.score{font-size:54px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,button{width:100%;padding:10px;border-radius:10px;border:none;margin-top:6px}
input{background:#1b2a44;color:white}
button{background:#4ea3ff;color:black;font-weight:600}
.small{font-size:12px;color:#9fb3d6}
.bar{height:8px;background:#1a2a45;border-radius:6px;margin-top:6px}
.fill{height:100%;border-radius:6px;background:#4ea3ff}
</style>
</head>
<body>
<div class="container">

<h1>Health Cockpit V5</h1>

<div class="card">
<h2>Score global</h2>
<div class="score" id="score">--</div>
<div class="small" id="bioAge"></div>
</div>

<div class="card">
<h2>Scores détaillés</h2>
<div>Score athéro<div class="bar"><div id="lipidBar" class="fill"></div></div></div>
<div>Cardio récupération<div class="bar"><div id="cardioBar" class="fill"></div></div></div>
<div>Métabolisme<div class="bar"><div id="metabolicBar" class="fill"></div></div></div>
<div>Fitness<div class="bar"><div id="fitnessBar" class="fill"></div></div></div>
</div>

<div class="card">
<h2>Ajouter des valeurs</h2>
<div class="grid">
<div><input id="ldl" placeholder="LDL"></div>
<div><input id="hdl" placeholder="HDL"></div>
<div><input id="tg" placeholder="Triglycerides"></div>
<div><input id="apob" placeholder="ApoB"></div>
<div><input id="lpa" placeholder="Lp(a)"></div>
<div><input id="crp" placeholder="CRP"></div>
<div><input id="hrv" placeholder="HRV"></div>
<div><input id="rhr" placeholder="FCR"></div>
<div><input id="sleep" placeholder="Sommeil"></div>
<div><input id="vo2" placeholder="VO2"></div>
<div><input id="iqos" placeholder="IQOS / jour"></div>
</div>
<button onclick="saveData()">Mettre à jour</button>
</div>

<div class="card">
<h2>Apple Health</h2>
<input type="file" id="healthImport">
<button onclick="importHealth()">Importer données santé</button>
</div>

<div class="card">
<h2>Scanner bilan sanguin</h2>
<input type="file" id="labScan">
<div class="small">Extraction automatique possible via IA/OCR (version future).</div>
</div>

<div class="card">
<h2>Sauvegarde</h2>
<button onclick="exportData()">Exporter JSON</button>
<input type="file" id="restoreFile">
<button onclick="restoreData()">Restaurer</button>
</div>

<div class="card">
<h2>Analyse IA locale</h2>
<div id="analysis" class="small"></div>
</div>

</div>

<script>
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

function scoreLDL(v){return v?clamp(100-((v-1)/(2.5-1))*100,0,100):50}
function scoreHDL(v){return v?clamp(((v-0.3)/(0.8-0.3))*100,0,100):50}
function scoreTG(v){return v?clamp(100-((v-0.7)/(2.5-0.7))*100,0,100):50}
function scoreApoB(v){return v?clamp(100-((v-0.7)/(1.6-0.7))*100,0,100):50}
function scoreLpa(v){return v?clamp(100-((v-5)/(80-5))*100,0,100):80}
function scoreCRP(v){return v?clamp(100-((v-0.3)/(3-0.3))*100,0,100):80}
function scoreHRV(v){return v?clamp(((v-30)/(75-30))*100,0,100):60}
function scoreRHR(v){return v?clamp(100-((v-50)/(80-50))*100,0,100):60}
function scoreSleep(v){return v?clamp(((v-5)/(8-5))*100,0,100):60}
function scoreVO2(v){return v?clamp(((v-30)/(55-30))*100,0,100):70}
function scoreIQOS(v){if(v==null)return 60;if(v==0)return 100;if(v<=3)return 80;if(v<=7)return 60;if(v<=12)return 40;return 20}

function compute(d){
let athero=Math.round(scoreApoB(d.apob)*0.4+scoreLDL(d.ldl)*0.2+scoreHDL(d.hdl)*0.15+scoreTG(d.tg)*0.1+scoreLpa(d.lpa)*0.1+scoreCRP(d.crp)*0.05)
let cardio=Math.round(scoreHRV(d.hrv)*0.35+scoreRHR(d.rhr)*0.25+scoreSleep(d.sleep)*0.2+scoreVO2(d.vo2)*0.2)
let metabolic=80
let fitness=Math.round(scoreVO2(d.vo2)*0.7+30)
let tobacco=scoreIQOS(d.iqos)
let global=Math.round(athero*0.30+cardio*0.25+metabolic*0.20+fitness*0.15+70*0.10)
let longevity=Math.round(athero*0.28+cardio*0.24+metabolic*0.18+fitness*0.12+70*0.10+tobacco*0.08)
let bioAge=41-((global-70)*0.16)-((longevity-75)*0.08)
return{athero,cardio,metabolic,fitness,global,longevity,bioAge}
}

function getState(){return JSON.parse(localStorage.getItem('healthV5')||'{}')}
function saveState(s){localStorage.setItem('healthV5',JSON.stringify(s))}

function saveData(){
let d={
ldl:parseFloat(ldl.value),
hdl:parseFloat(hdl.value),
tg:parseFloat(tg.value),
apob:parseFloat(apob.value),
lpa:parseFloat(lpa.value),
crp:parseFloat(crp.value),
hrv:parseFloat(hrv.value),
rhr:parseFloat(rhr.value),
sleep:parseFloat(sleep.value),
vo2:parseFloat(vo2.value),
iqos:parseFloat(iqos.value)
}
let s=getState()
s.current=d
saveState(s)
update()
}

function update(){
let s=getState()
if(!s.current)return
let r=compute(s.current)
score.textContent=r.global
bioAge.textContent="Age biologique estimé : "+r.bioAge.toFixed(1)
lipidBar.style.width=r.athero+"%"
cardioBar.style.width=r.cardio+"%"
metabolicBar.style.width=r.metabolic+"%"
fitnessBar.style.width=r.fitness+"%"
analysis.textContent="Score longévité : "+r.longevity+". Le principal levier reste ApoB / LDL."
}

function exportData(){
let data=localStorage.getItem('healthV5')
let blob=new Blob([data],{type:'application/json'})
let a=document.createElement('a')
a.href=URL.createObjectURL(blob)
a.download='health_backup.json'
a.click()
}

function restoreData(){
let f=document.getElementById('restoreFile').files[0]
if(!f)return
let reader=new FileReader()
reader.onload=e=>{localStorage.setItem('healthV5',e.target.result);update()}
reader.readAsText(f)
}

function importHealth(){
let f=document.getElementById('healthImport').files[0]
if(!f)return
let reader=new FileReader()
reader.onload=e=>{
try{
let data=JSON.parse(e.target.result)
let s=getState()
s.current={...s.current,...data}
saveState(s)
update()
}catch{}
}
reader.readAsText(f)
}

update()
</script>
</body>
</html>
